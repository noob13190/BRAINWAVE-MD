<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINWAVE MD | TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #050505; 
            color: #00f3ff; 
            font-family: 'Share Tech Mono', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Scanline Effect */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 243, 255, 0.05);
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Main Container */
        .tech-box {
            background: rgba(0, 10, 15, 0.8);
            border: 2px solid #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3), inset 0 0 20px rgba(0, 243, 255, 0.1);
            border-radius: 10px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Glitch Title */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00f3ff;
            animation: pulse 2s infinite;
        }
        .subtitle {
            font-size: 12px;
            color: #7df9ff;
            margin-bottom: 30px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px #00f3ff; }
            50% { text-shadow: 0 0 20px #00f3ff, 0 0 30px #00f3ff; }
        }

        /* Input Field */
        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid #00f3ff;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            text-align: center;
            letter-spacing: 3px;
            outline: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        input::placeholder { color: rgba(0, 243, 255, 0.3); }
        input:focus {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            background: rgba(0, 243, 255, 0.1);
        }

        /* Tech Button */
        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid #00f3ff;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        button:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 20px #00f3ff;
        }

        /* Output & Loader */
        #loader {
            margin-top: 20px;
            font-size: 14px;
            animation: blink 1s infinite;
            display: none;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        #codeDisplay {
            margin-top: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 35px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 8px;
            text-shadow: 0 0 15px #00f3ff;
        }

        .dev-tag {
            margin-top: 30px;
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="tech-box">
        <h1>BRAINWAVE MD</h1>
        <div class="subtitle">SECURE PAIRING TERMINAL // V2.0</div>

        <input type="number" id="num" placeholder="92331XXXXXXX" autocomplete="off">
        <button onclick="getCode()">INITIALIZE CONNECTION</button>

        <div id="loader">ESTABLISHING SECURE LINK... [WAIT]</div>
        <div id="codeDisplay"></div>

        <div class="dev-tag">DEVELOPED BY SHAHZAIB TECH</div>
    </div>

    <script>
        async function getCode() {
            const number = document.getElementById('num').value;
            if(!number) {
                alert("[ERROR] TARGET NUMBER REQUIRED!");
                return;
            }
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('codeDisplay').innerText = '';

            // ⚠️ Aapka ADP/VPS Link
            const botUrl = "http://merlinclan.duckdns.org:25588"; 

            try {
                const response = await fetch(`${botUrl}/pair-web?number=${number}`);
                const data = await response.json();
                document.getElementById('loader').style.display = 'none';
                
                if(data.code) {
                    document.getElementById('codeDisplay').innerText = data.code;
                } else {
                    alert("[SYSTEM FAILURE] " + data.error);
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                alert("[CONNECTION LOST] Server offline or unreachable.");
            }
        }
    </script>
</body>
</html>
